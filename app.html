<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Rooted</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F4EFE6;
      --green: #2D4A2D;
      --green-light: #3d6b3d;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--cream);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
    }

    /* ── MOBILE: full screen iframe ── */
    .mobile-frame {
      display: none;
      width: 100vw;
      height: 100vh;
    }

    /* ── DESKTOP: phone mockup ── */
    .desktop-frame {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      gap: 20px;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      letter-spacing: 0.25em;
      color: var(--green);
      text-transform: uppercase;
    }

    .phone {
      position: relative;
      width: 375px;
      height: 720px;
      background: var(--green);
      border-radius: 44px;
      padding: 12px;
      box-shadow:
        0 0 0 1px rgba(45,74,45,0.15),
        0 40px 80px rgba(45,74,45,0.25),
        inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    .phone::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 6px;
      background: rgba(255,255,255,0.12);
      border-radius: 3px;
      z-index: 10;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 34px;
      overflow: hidden;
      background: var(--cream);
    }

    .phone-screen iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .tagline {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 12px;
      letter-spacing: 0.15em;
      color: var(--green);
      opacity: 0.55;
      text-transform: uppercase;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 500px), (max-height: 750px) {
      .desktop-frame { display: none; }
      .mobile-frame { display: block; }
    }
  </style>
</head>
<body>

  <!-- MOBILE: fills screen, no frame -->
  <iframe
    class="mobile-frame"
    src="https://rooted-50826.bubbleapps.io/"
    scrolling="auto"
    allowfullscreen
  ></iframe>

  <!-- DESKTOP: phone mockup -->
  <div class="desktop-frame">
    <span class="wordmark">Rooted</span>
    <div class="phone">
      <div class="phone-screen">
        <iframe
          src="https://rooted-50826.bubbleapps.io/"
          scrolling="auto"
          allowfullscreen
        ></iframe>
      </div>
    </div>
    <span class="tagline">The tree is the whole point</span>
  </div>

</body>
</html>
